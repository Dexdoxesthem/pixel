<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Studios | Art & Logic</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black h-screen w-full flex items-center justify-center overflow-hidden">
  <div class="grain-overlay"></div>

  <div class="relative z-10 w-full max-w-md px-8 text-center">
    
    <div class="mb-12 animate-pulse">
      <img src="logo.png" alt="Pixel Logo" class="w-32 mx-auto object-contain" onerror="this.src='https://placehold.co/120x40/000/FFF?text=PIXEL'"/>
    </div>

    <h1 class="text-white text-2xl font-black uppercase tracking-tighter mb-2">Pixel Studios</h1>
    <p class="text-[9px] font-bold uppercase tracking-[0.6em] text-zinc-500 mb-12 italic">Engineering Visual Intelligence</p>
    
    <div class="flex flex-col gap-6">
      
      <a href="photography.html" class="btn-photo-pill justify-center py-5 text-sm group">
        <span>Photography & Media</span>
        <i data-lucide="camera" class="ml-3 w-4 h-4 group-hover:rotate-12 transition-transform"></i>
      </a>
      
      <a href="tech.html" class="btn-tech-pill justify-center py-5 text-sm group">
        <span>Tech Solutions</span>
        <i data-lucide="cpu" class="ml-3 w-4 h-4 group-hover:scale-110 transition-transform"></i>
      </a>

    </div>

    <div class="mt-20 opacity-20 flex items-center justify-center gap-2">
        <i data-lucide="map-pin" class="w-3 h-3"></i>
        <span class="text-[8px] font-bold uppercase tracking-[0.3em]">Kolkata, India</span>
    </div>

  </div>

  <script>
    // Initialize the icons
    lucide.createIcons();
    
    // Clear any previous session preferences so they always see the gateway on a new visit
    sessionStorage.removeItem('pixel_studio_pref');
  </script>
</body>
</html>
